<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Positron Mobile</title>
    <style>
        :root { --bg: #1e1e1e; --text: #d4d4d4; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #252526; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 50px; }
        #editor { flex: 1; width: 100%; background: var(--bg); color: #9cdcfe; padding: 15px; border: none; font-size: 14px; outline: none; border-bottom: 2px solid #333; resize: none; }
        #console { flex: 1; background: #000; padding: 10px; overflow-y: auto; font-size: 12px; }
        .log-entry { color: #888; font-style: italic; margin-bottom: 5px; }
        #r-output { white-space: pre-wrap; color: #fff; margin-top: 5px; }
        #plot-canvas { width: 100%; max-width: 500px; background: white; display: none; margin: 10px 0; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.1em;"><b>Positron</b> <span style="opacity:0.5">Mobile</span></div>
    <button id="run-btn" disabled>Booting...</button>
</header>

<textarea id="editor" spellcheck="false"># Write R code here
x <- rnorm(100)
y <- x + rnorm(100)
plot(x, y, col="steelblue", pch=19, main="Mobile webR Plot")
print(mean(x))</textarea>

<div id="console">
    <div id="status-log"></div>
    <canvas id="plot-canvas" width="1000" height="1000"></canvas>
    <div id="r-output"></div>
</div>

<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    // 1. Setup the Engine
    const webR = new WebR({ channelType: 0 });
    const runBtn = document.getElementById('run-btn');
    const statusLog = document.getElementById('status-log');
    const rOutput = document.getElementById('r-output');
    const canvas = document.getElementById('plot-canvas');
    const ctx = canvas.getContext('2d');

    function log(msg) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = `> ${msg}`;
        statusLog.appendChild(div);
        statusLog.scrollTop = statusLog.scrollHeight;
    }

    async function init() {
        try {
            log("Initializing WASM...");
            await webR.init();
            log("webR is ready!");
            runBtn.innerText = "RUN CODE";
            runBtn.disabled = false;
        } catch (e) {
            log("Error: " + e.message);
        }
    }

    async function runCode() {
        const code = document.getElementById('editor').value;
        runBtn.disabled = true;
        rOutput.innerText = "Running...";
        
        // Clear plot
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';

        try {
            // Tell R to use the webR canvas device
            await webR.evalRVoid('options(device = webr::canvas)');
            await webR.evalRVoid('webr::canvas(width=5, height=5, units="in", res=200)');
            
            await webR.evalRVoid(code);
            
            // Get messages from R
            const msgs = await webR.flush();
            
            rOutput.innerText = "";
            msgs.forEach(msg => {
                if (msg.type === 'stdout') {
                    rOutput.innerText += msg.data + '\n';
                }
                // Handle the plot data
                if (msg.type === 'canvas' && msg.data.event === 'canvasImage') {
                    canvas.style.display = 'block';
                    ctx.drawImage(msg.data.image, 0, 0);
                }
            });
        } catch (e) {
            rOutput.innerText = "R Error: " + e.message;
        } finally {
            runBtn.disabled = false;
        }
    }

    runBtn.onclick = runCode;
    init();
</script>

</body>
</html>

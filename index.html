<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    // 1. Force webR to use PostMessage channel (avoids COOP/COEP issues)
    const webR = new WebR({
        channelType: 0 // This is the 'PostMessage' channel
    });

    const runBtn = document.getElementById('run-btn');
    const clearBtn = document.getElementById('clear-btn');
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const canvas = document.getElementById('plot-canvas');

    async function init() {
        try {
            console.log("webR starting...");
            await webR.init();
            console.log("webR initialized!");
            
            status.innerText = "Engine: Ready (PostMessage)";
            runBtn.disabled = false;
            runBtn.innerText = "Run Code";
            log.innerHTML = "R Session Started. Ready for input.\n";
        } catch (e) {
            console.error(e);
            log.innerText = "Initialization Error: " + e.message + 
                            "\n\nTry refreshing the page.";
            status.innerText = "Engine: Error";
        }
    }

    async function runCode() {
        const code = document.getElementById('editor').value;
        runBtn.disabled = true;
        
        // Reset plot
        canvas.style.display = 'none';
        
        try {
            // Setup plot device inside the R session
            await webR.evalRVoid('canvas(width=500, height=500)');
            
            const shelve = await webR.evalR(code);
            const msgs = await webR.flush();
            
            msgs.forEach(msg => {
                if (msg.type === 'stdout') {
                    const div = document.createElement('div');
                    div.innerText = msg.data;
                    log.appendChild(div);
                }
                if (msg.type === 'canvas' && msg.data === 'show') {
                    canvas.style.display = 'block';
                }
            });
        } catch (err) {
            const errDiv = document.createElement('div');
            errDiv.style.color = '#ff5555';
            errDiv.innerText = "Error: " + err.message;
            log.appendChild(errDiv);
        } finally {
            runBtn.disabled = false;
            log.scrollTop = log.scrollHeight;
        }
    }

    clearBtn.onclick = () => { 
        log.innerHTML = ""; 
        canvas.style.display = 'none'; 
    };
    runBtn.onclick = runCode;

    init();

    // Bind canvas to webR
    webR.setCanvasElement(canvas);
</script>

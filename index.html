<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Positron Mobile</title>
    <style>
        :root { --bg: #1e1e1e; --text: #d4d4d4; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 10px; background: #252526; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 50px; }
        #editor { flex: 1; width: 100%; background: var(--bg); color: #9cdcfe; padding: 15px; border: none; font-size: 14px; outline: none; border-bottom: 2px solid #333; resize: none; }
        #console { flex: 1; background: #000; padding: 10px; overflow-y: auto; font-size: 12px; }
        #r-output { white-space: pre-wrap; color: #fff; margin-top: 5px; }
        #plot-canvas { width: 100%; height: auto; background: white; display: none; margin: 10px 0; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .sys-log { color: #666; font-size: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div><b>Positron</b> <span style="opacity:0.5">Mobile</span></div>
    <button id="run-btn" disabled>Booting...</button>
</header>

<textarea id="editor" spellcheck="false"># Margin Fix Test
plot(1:10, main="It Works!", col="blue", pch=16)
print("Engine is running!")</textarea>

<div id="console">
    <div id="status-log"></div>
    <canvas id="plot-canvas"></canvas>
    <div id="r-output"></div>
</div>

<script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    const webR = new WebR({ channelType: 0 });
    const runBtn = document.getElementById('run-btn');
    const rOutput = document.getElementById('r-output');
    const statusLog = document.getElementById('status-log');
    const canvas = document.getElementById('plot-canvas');
    const ctx = canvas.getContext('2d');

    function log(msg) {
        const div = document.createElement('div');
        div.className = 'sys-log';
        div.innerText = `> ${msg}`;
        statusLog.appendChild(div);
    }

    async function init() {
        try {
            log("Initializing webR...");
            await webR.init();
            log("Ready.");
            runBtn.innerText = "RUN CODE";
            runBtn.disabled = false;
        } catch (e) {
            log("Error: " + e.message);
        }
    }

    async function runCode() {
        runBtn.disabled = true;
        rOutput.innerText = "Processing...";
        canvas.style.display = 'none';

        try {
            // 1. Close any "zombie" devices that might be holding old margin errors
            await webR.evalRVoid('graphics.off()');
            
            // 2. Set the device to webR's canvas
            await webR.evalRVoid('options(device = webr::canvas)');
            
            // 3. IMPORTANT: Create a large virtual space (10x10 inches) 
            // This makes it mathematically impossible for margins to be "too large"
            await webR.evalRVoid('webr::canvas(width=10, height=10, units="in", res=72)');
            
            // 4. Force small margins just in case
            await webR.evalRVoid('par(mar=c(4, 4, 2, 1))');
            
            const code = document.getElementById('editor').value;
            await webR.evalRVoid(code);
            
            const msgs = await webR.flush();
            rOutput.innerText = "";
            
            msgs.forEach(msg => {
                if (msg.type === 'stdout') rOutput.innerText += msg.data + '\n';
                if (msg.type === 'canvas' && (msg.data.event === 'canvasImage' || msg.data.image)) {
                    const img = msg.data.image || msg.data;
                    
                    // Resize the internal canvas pixels to match the received image
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    canvas.style.display = 'block';
                    ctx.drawImage(img, 0, 0);
                } else if (msg.type === 'canvas' && msg.data === 'show') {
                    canvas.style.display = 'block';
                }
            });
        } catch (e) {
            rOutput.innerText = "R Error: " + e.message;
        } finally {
            runBtn.disabled = false;
        }
    }

    runBtn.onclick = runCode;
    init();
</script>

</body>
</html>

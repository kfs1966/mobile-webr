<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Positron Mobile Debug</title>
    <style>
        :root { --bg: #1e1e1e; --text: #d4d4d4; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: #252526; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        #editor { flex: 1; width: 100%; background: var(--bg); color: #9cdcfe; padding: 15px; border: none; font-size: 14px; outline: none; border-bottom: 2px solid #333; }
        #console { flex: 1; background: #000; padding: 10px; overflow-y: auto; font-size: 12px; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .sys { color: #888; }
        .err { color: #ff5555; font-weight: bold; }
        .r-out { color: #fff; }
        #plot-canvas { width: 100%; background: white; display: none; margin: 10px 0; border-radius: 4px; }
        button { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

<header>
    <div><b>Positron</b> Mobile</div>
    <button id="run-btn" disabled>Booting Engine...</button>
</header>

<textarea id="editor" spellcheck="false"># Test Plot
plot(rnorm(50), col="red", pch=19, main="It Works!")
print("R is alive!")</textarea>

<div id="console">
    <div id="status-log"></div>
    <canvas id="plot-canvas"></canvas>
    <div id="r-output"></div>
</div>

<script type="module">
    // Helper to print errors to the screen immediately
    const statusLog = document.getElementById('status-log');
    function log(msg, type = 'sys') {
        const div = document.createElement('div');
        div.className = 'log-entry ' + type;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        statusLog.appendChild(div);
        console.log(msg);
    }

    log("Step 1: Loading webR library...");

    // Adding a timestamp to the URL to bypass any phone/provider cache
    const webrUrl = `https://webr.r-wasm.org/latest/webr.mjs?v=${Date.now()}`;
    
    import(webrUrl).then(async (module) => {
        const WebR = module.WebR;
        log("Step 2: Library loaded. Initializing WebR...");

        const webR = new WebR({
            channelType: 0, // PostMessage mode (essential for GitHub Pages)
            baseUrl: 'https://webr.r-wasm.org/latest/'
        });

        const runBtn = document.getElementById('run-btn');
        const canvas = document.getElementById('plot-canvas');
        const rOut = document.getElementById('r-output');

        try {
            log("Step 3: Attaching Canvas...");
            webR.setCanvasElement(canvas);

            log("Step 4: Awaiting internal WASM boot...");
            await webR.init();
            
            log("SUCCESS: Engine Ready!", "sys");
            runBtn.innerText = "RUN CODE";
            runBtn.disabled = false;

            runBtn.onclick = async () => {
                runBtn.disabled = true;
                rOut.innerText = "Running...";
                canvas.style.display = 'none';
                
                try {
                    // Set device and run code
                    await webR.evalRVoid('options(device = webr::canvas)');
                    await webR.evalRVoid('webr::canvas(width=500, height=500)');
                    
                    const code = document.getElementById('editor').value;
                    const shelve = await webR.evalR(code);
                    const msgs = await webR.flush();
                    
                    rOut.innerText = "";
                    msgs.forEach(m => {
                        if (m.type === 'stdout') rOut.innerText += m.data + '\n';
                        if (m.type === 'canvas' && m.data === 'show') canvas.style.display = 'block';
                    });
                } catch (e) {
                    log("R Error: " + e.message, "err");
                } finally {
                    runBtn.disabled = false;
                }
            };

        } catch (err) {
            log("BOOT ERROR: " + err.message, "err");
            log("Check if your browser supports WebAssembly.", "sys");
        }
    }).catch(err => {
        log("NETWORK ERROR: Could not load webR from CDN.", "err");
        log(err.message, "err");
    });
</script>

</body>
</html>

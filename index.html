<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debug Positron</title>
    <style>
        body { background: #1e1e1e; color: #ccc; font-family: monospace; margin: 0; padding: 10px; }
        #debug-log { background: #000; border: 1px solid #444; height: 150px; overflow-y: auto; padding: 10px; font-size: 11px; margin-bottom: 10px; color: #0f0; }
        #editor { width: 100%; height: 200px; background: #252526; color: #fff; border: 1px solid #333; padding: 10px; box-sizing: border-box; }
        .controls { margin: 10px 0; display: flex; gap: 10px; }
        button { padding: 10px; flex: 1; font-weight: bold; }
        #status-bar { font-size: 12px; margin-top: 10px; color: #aaa; }
        .err { color: #ff5555; }
    </style>
</head>
<body>

    <div id="debug-log">DEBUG CONSOLE:<br></div>

    <textarea id="editor">print("Hello from R!")
plot(rnorm(50))</textarea>

    <div class="controls">
        <button id="run-btn" disabled>Wait for Initialization...</button>
    </div>

    <canvas id="plot-canvas" style="width:100%; background:white; display:none;"></canvas>
    <div id="r-output" style="white-space: pre-wrap; margin-top:10px;"></div>

    <div id="status-bar">Status: Initializing Script...</div>

<script type="module">
    // Add a helper to print to our on-screen console
    const dbg = (msg, isErr = false) => {
        const log = document.getElementById('debug-log');
        const span = document.createElement('div');
        if(isErr) span.className = 'err';
        span.innerText = `> ${msg}`;
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
    };

    dbg("Script module loaded.");

    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';
    
    dbg("webR module imported successfully.");

    const webR = new WebR({
        channelType: 0, // PostMessage (safe for GitHub Pages)
        baseUrl: 'https://webr.r-wasm.org/latest/' // Explicitly point to CDN
    });

    const runBtn = document.getElementById('run-btn');
    const status = document.getElementById('status-bar');
    const rOutput = document.getElementById('r-output');

    async function start() {
        try {
            dbg("Calling webR.init()...");
            status.innerText = "Status: webR.init() called...";
            
            await webR.init();
            
            dbg("webR.init() completed!");
            status.innerText = "Status: Engine Ready";
            runBtn.innerText = "RUN CODE";
            runBtn.disabled = false;
        } catch (e) {
            dbg("FATAL ERROR: " + e.message, true);
            status.innerText = "Status: Failed";
        }
    }

    runBtn.onclick = async () => {
        const code = document.getElementById('editor').value;
        dbg("Executing R code...");
        try {
            await webR.evalRVoid('canvas(width=500, height=500)');
            await webR.evalRVoid(code);
            const msgs = await webR.flush();
            msgs.forEach(m => {
                if(m.type === 'stdout') rOutput.innerText += m.data + '\n';
                if(m.type === 'canvas' && m.data === 'show') document.getElementById('plot-canvas').style.display = 'block';
            });
            dbg("Execution finished.");
        } catch (e) {
            dbg("R Error: " + e.message, true);
        }
    };

    // Give the browser a second to breathe before starting
    setTimeout(start, 500);

    // Setup plotting
    webR.setCanvasElement(document.getElementById('plot-canvas'));
</script>
</body>
</html>
